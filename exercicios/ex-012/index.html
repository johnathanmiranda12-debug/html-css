<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="HTML5-icon.png" type="image/x-icon">
    <title>Videos em HTML</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video esta hospedado no meu proprio servidor.</p>
    <video width="560" controls>
        <source src="midias/meu-video.webm.webm" type="video/webm">
        <source src="midias/meu-video2.0.mp4.mp4" type="video/mp4">
        <source src="midias/meu-video.mkv.mkv" type="video/mkv">
        <source src="midias/meu-video.mp4.mp4" type="video/mp4">
        <p>Se o navegador nao tem compatibilidade com reproduçao de videos.</p>
    </video>
    <hr>
    <h1>Inserindo videos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=Nw4oFeM_9ysoq2SX" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>

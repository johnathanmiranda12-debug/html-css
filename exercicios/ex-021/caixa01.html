<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="css-3-icon.png" type="image/x-icon">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 39px;
            width: 373px;

            border: 10px solid blue;

            padding: 20px 20px 20px 20px;

            padding: 10px;

            margin: 10px auto 40px auto;

            outline: 5px dashed black;  
        }

        a {
            border: 10px solid green;

            padding: 20px;
        }

    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragrafos também sao exemplos de box-level, mas os <a href="#">Links sao exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>

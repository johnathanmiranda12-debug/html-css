<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="HTML5-icon.png" type="image/x-icon">
    <title>Gradiente em CSS</title>

        * { /*Configuraçoes globais das CSS */

</head>

    <h1>Testanto Gradiente</h1>

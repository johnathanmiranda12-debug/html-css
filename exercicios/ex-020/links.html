<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="css-3-icon.png" type="image/x-icon">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: yellow;
        }

        a::before {
            content: '⇒ ';
            text-decoration: none;
            font-weight: bold;
            color: gray;
        }

        a::after {
            content: ' ⇐';
            text-decoration: none;
            font-weight: bold;
            color: gray;
        }

        .especial {
            background-color: rgb(229, 127, 127);
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul type="disc">
        <li><a href="https://gustavoguanabara.github.io/" target="_blank" rel="noopener">Repositorio do GitHub</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" target="_blank" rel="external" class="especial">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank" rel="noopener">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
